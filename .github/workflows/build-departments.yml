name: Build department databases

on:
  workflow_dispatch: {}
  schedule:
    # Une fois par mois (le 1er à 3h du matin UTC) -- OSM bouge lentement
    # pour les limites de vitesse, pas besoin de plus fréquent.
    - cron: "0 3 1 * *"

permissions:
  contents: write   # nécessaire pour créer/mettre à jour la Release

jobs:
  build-db:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Installer pyosmium
        run: pip install "osmium>=4.0,<5.0"

      - name: Construire les .db départementaux
        env:
          OUTPUT_DIR: dist
        run: python3 scripts/build_all_departments.py

      - name: Télécharger et convertir les radars (France entière)
        run: |
          curl -fSL --retry 3 --retry-delay 5 \
            -A "Mozilla/5.0 (compatible; BBS-mOOve-build/1.0)" \
            -o dist/radars.csv \
            "https://www.data.gouv.fr/api/1/datasets/r/8a22b5a8-4b65-41be-891a-7c0aead4ba51"
          python3 scripts/radars_to_db.py dist/radars.csv dist/radars.db
          rm -f dist/radars.csv dist/radars.db

      - name: Lister les .db.gz produits
        run: ls -la dist/*.db.gz

      - name: Publier en Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: osm-data-latest
          name: "Données OSM régionales (dernière build)"
          body: |
            Bases SQLite légères (routes + maxspeed + junction), compressées
            en gzip, générées automatiquement depuis les extraits Geofabrik
            (découpage par ancienne région française).
            Téléchargées à la demande par l'app BBS mOOve.
          files: dist/*.db.gz
          make_latest: true
